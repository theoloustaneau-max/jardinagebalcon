<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="pr-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6770"/>
      <stop offset="1" stop-color="#3d4d56"/>
    </linearGradient>
    <linearGradient id="pr-bodyL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".18"/>
      <stop offset=".35" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="pr-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6e7882"/>
      <stop offset="1" stop-color="#4a5760"/>
    </linearGradient>
    <linearGradient id="pr-soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a4230"/>
      <stop offset="1" stop-color="#4a3322"/>
    </linearGradient>
    <linearGradient id="pr-leafA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#74c46a"/>
      <stop offset="1" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="pr-leafB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#52b788"/>
      <stop offset="1" stop-color="#2d6a4f"/>
    </linearGradient>
    <linearGradient id="pr-leafC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fd47f"/>
      <stop offset="1" stop-color="#3f8b62"/>
    </linearGradient>
    <radialGradient id="g-shadow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#3d4d56" stop-opacity=".28"/>
      <stop offset="1" stop-color="#3d4d56" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="200" cy="338" rx="118" ry="22" fill="url(#g-shadow)"/>

  <!-- foliage behind rim (wide, two clumps) -->
  <g>
    <!-- left clump -->
    <path d="M158 180 C120 166 96 122 106 86 C140 108 158 142 166 180 Z" fill="url(#pr-leafB)"/>
    <path d="M156 182 C130 160 116 122 122 92 C146 118 162 150 164 182 Z" fill="url(#pr-leafA)"/>
    <path d="M160 182 C172 150 184 116 182 84 C168 110 158 150 158 182 Z" fill="url(#pr-leafC)"/>
    <!-- right clump -->
    <path d="M242 180 C280 166 304 122 294 86 C260 108 242 142 234 180 Z" fill="url(#pr-leafA)"/>
    <path d="M244 182 C270 160 284 122 278 92 C254 118 238 150 236 182 Z" fill="url(#pr-leafB)"/>
    <path d="M240 182 C228 150 216 116 218 84 C232 110 242 150 242 182 Z" fill="url(#pr-leafC)"/>
    <!-- center fill -->
    <path d="M200 184 C176 168 160 138 158 112 C182 128 196 156 204 184 Z" fill="url(#pr-leafB)" opacity=".95"/>
    <path d="M200 184 C224 168 240 138 242 112 C218 128 204 156 196 184 Z" fill="url(#pr-leafA)" opacity=".95"/>
    <path d="M200 186 C196 152 198 116 206 90 C218 120 213 162 207 186 Z" fill="url(#pr-leafC)"/>
  </g>

  <!-- planter body -->
  <path d="M108 186 L292 186 L278 304 Q277 314 267 314 L133 314 Q123 314 122 304 Z" fill="url(#pr-body)"/>
  <path d="M108 186 L292 186 L278 304 Q277 314 267 314 L133 314 Q123 314 122 304 Z" fill="url(#pr-bodyL)"/>
  <!-- rim -->
  <path d="M104 174 L296 174 Q300 174 300 178 L300 188 Q300 192 296 192 L104 192 Q100 192 100 188 L100 178 Q100 174 104 174 Z" fill="url(#pr-rim)"/>
  <rect x="100" y="174" width="200" height="4" rx="2" fill="#ffffff" opacity=".22"/>
  <!-- water reserve indicator window -->
  <rect x="262" y="270" width="14" height="34" rx="4" fill="#aeb8c0"/>
  <rect x="265" y="285" width="8" height="16" rx="3" fill="#52b788"/>
  <!-- soil -->
  <path d="M112 186 L288 186 L286 198 Q200 210 114 198 Z" fill="url(#pr-soil)"/>
</svg>
